name: Release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install Changesets
        run: npm install @changesets/cli @changesets/changelog-github

      - name: Run changeset version
        run: npx changeset version

      - name: Commit generated release files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add package.json CHANGELOG.md .changeset
          git commit -m "chore: version and changelog" || echo "No changes"

      - name: Push release commit
        run: git push

      - name: Load version from package.json
        run: |
          echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

      - name: Create tag
        run: |
          git tag v$VERSION
          git push origin v$VERSION

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          generate_release_notes: true