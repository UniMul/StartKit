name: Changeset Check

on:
  pull_request:
    branches:
      - main

jobs:
  changeset-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: changed
        shell: bash
        run: |
          set -euo pipefail
          base_ref="origin/${{ github.base_ref }}"
          git fetch origin "${{ github.base_ref }}" --depth=1
          git diff --name-only "$base_ref"...HEAD > changed_files.txt
          cat changed_files.txt

      - name: Skip docs-only changes
        id: docs_only
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -s changed_files.txt ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if grep -vE '^(README(\.ja)?\.md|docs/|assets/|\.github/ISSUE_TEMPLATE/|\.github/pull_request_template\.md|LICENSE|\.changeset/.*\.md)$' changed_files.txt >/dev/null; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Require changeset for non-doc changes
        if: steps.docs_only.outputs.docs_only == 'false'
        shell: bash
        run: |
          set -euo pipefail
          if ls .changeset/*.md >/dev/null 2>&1; then
            echo "Changeset found."
          else
            echo "No changeset found."
            echo "Please add a .changeset/*.md file for user-facing changes."
            exit 1
          fi

      - name: Skip message
        if: steps.docs_only.outputs.docs_only == 'true'
        shell: bash
        run: echo "Docs-only or metadata-only changes detected. Skipping changeset requirement."
