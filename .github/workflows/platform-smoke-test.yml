name: Platform Smoke Test

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  smoke-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Make scripts executable
        shell: bash
        run: |
          chmod +x bin/start-kit

      - name: Initial Setup
        shell: bash
        run: |
          ./bin/start-kit init

      - name: Install macOS bootstrap
        shell: bash
        run: |
          ./bin/start-kit install profile macos-bootstrap --yes

      - name: Install base profile
        shell: bash
        run: |
          ./bin/start-kit install profile base --yes

      - name: Verify environment
        shell: bash
        run: |
          ./bin/start-kit doctor
          git --version
          brew --version

  smoke-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5

      - name: Make scripts executable
        run: |
          chmod +x bin/start-kit

      - name: Initial Setup
        run: |
          ./bin/start-kit init

      - name: Install Windows bootstrap
        run: |
          ./bin/start-kit install profile windows-bootstrap --yes

      - name: Install base profile
        run: |
          ./bin/start-kit install profile base --yes

      - name: Verify environment
        run: |
          ./bin/start-kit doctor
          git --version
          winget --version